<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#060a12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SOS-GUIDE</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='80'%3E⛑️%3C/text%3E%3C/svg%3E">
<style>
/* ─── TOKENS ──────────────────────────────────────────────────────── */
:root{
  --bg:#060a12;--bg1:#0c1120;--bg2:#111928;--card:#0f1826;--card-h:#162035;
  --border:rgba(255,255,255,.07);--border-h:rgba(255,255,255,.16);
  --text:#e8eef8;--sub:#6b7fa3;--muted:#2a3a54;
  --nav-h:58px;--r:14px;--r-lg:18px;
  --accent:#3b82f6;--green:#22c55e;--red:#ef4444;
}
body.light-mode{
  --bg:#f0f4fb;--bg1:#e8eef8;--bg2:#dde4f0;--card:#ffffff;--card-h:#eff6ff;
  --border:rgba(0,0,0,.07);--border-h:rgba(0,0,0,.16);
  --text:#0f172a;--sub:#475569;--muted:#94a3b8;
}
/* ─── RESET ───────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh;transition:background .3s,color .3s}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bg2);border-radius:4px}
/* ─── NAV ─────────────────────────────────────────────────────────── */
#nav{position:fixed;top:0;left:0;right:0;z-index:800;height:var(--nav-h);display:flex;align-items:center;background:rgba(6,10,18,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1.25rem;gap:.75rem;transition:background .3s,border-color .3s}
body.light-mode #nav{background:rgba(240,244,251,.95)}
.nav-logo{flex:1;display:flex;align-items:center;gap:.6rem;font-weight:700;font-size:.95rem;letter-spacing:.02em;cursor:pointer;user-select:none}
.nav-logo-badge{width:28px;height:28px;background:var(--card);border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0}
.nav-right{display:flex;align-items:center;gap:.4rem}
.nav-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--card);color:var(--sub);display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .15s}
.nav-btn:hover{background:var(--card-h);color:var(--text);border-color:var(--border-h)}
.nav-btn:active{transform:scale(.92)}
.hamburger{width:36px;height:36px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;border-radius:9px;background:transparent;transition:background .15s}
.hamburger:hover{background:rgba(255,255,255,.07)}
body.light-mode .hamburger:hover{background:rgba(0,0,0,.06)}
.hamburger span{display:block;width:20px;height:1.5px;background:var(--text);border-radius:2px}
/* ─── DRAWER ──────────────────────────────────────────────────────── */
.drawer-overlay{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);visibility:hidden;opacity:0;transition:visibility .2s,opacity .2s}
.drawer-overlay.active{visibility:visible;opacity:1}
.drawer{position:fixed;top:0;left:0;width:280px;height:100%;background:var(--bg1);border-right:1px solid var(--border);transform:translateX(-100%);z-index:1000;display:flex;flex-direction:column;padding:1.25rem 1rem;transition:background .3s,border-color .3s,transform .25s cubic-bezier(.4,0,.2,1)}
.drawer-overlay.active .drawer{transform:translateX(0)}
.drawer-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:1rem;margin-bottom:1rem;border-bottom:1px solid var(--border)}
.drawer-title{font-weight:700;font-size:.95rem}
.drawer-close{width:30px;height:30px;border-radius:8px;background:var(--bg2);color:var(--sub);font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer}
.drawer-close:hover{background:rgba(239,68,68,.15);color:var(--red)}
.drawer-nav{display:flex;flex-direction:column;gap:.5rem}
.drawer-nav a{display:block;padding:.7rem 1rem;border-radius:var(--r);background:var(--card);border:1px solid var(--border);font-weight:500;font-size:.9rem;color:var(--text);transition:all .15s}
.drawer-nav a:hover{background:var(--card-h);border-color:var(--border-h);color:var(--accent)}
.drawer-footer{margin-top:auto;padding-top:1.5rem;text-align:center;font-size:.7rem;color:var(--sub);border-top:1px solid var(--border)}
/* ─── LANG MODAL ──────────────────────────────────────────────────── */
.lang-modal-overlay{position:fixed;inset:0;z-index:10001;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:visibility .2s,opacity .2s;padding:1rem}
.lang-modal-overlay.active{visibility:visible;opacity:1}
.lang-modal-container{background:var(--bg1);border-radius:20px;width:100%;max-width:720px;max-height:82vh;overflow-y:auto;border:1px solid var(--border);box-shadow:0 32px 64px rgba(0,0,0,.6);animation:popIn .18s ease both}
.lang-modal-header{display:flex;justify-content:flex-end;align-items:center;padding:1.1rem 1.5rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg1)}
.lang-modal-close{width:30px;height:30px;border-radius:8px;background:var(--bg2);color:var(--sub);font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer}
.lang-modal-close:hover{background:rgba(239,68,68,.15);color:var(--red);transform:rotate(90deg)}
.lang-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.6rem;padding:1.25rem}
.lang-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.65rem 1rem;display:flex;align-items:center;gap:.65rem;cursor:pointer;transition:all .15s}
.lang-card:hover{background:var(--card-h);border-color:var(--accent)}
.lang-card:active{transform:scale(.96)}
.lang-flag{font-size:1.5rem}
.lang-name{font-size:.9rem;font-weight:500;color:var(--text)}
/* ─── SPLASH ──────────────────────────────────────────────────────── */
#splashScreen{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(var(--nav-h) + 2rem) 1.25rem 2.5rem}
#splashScreen.hide{display:none}
.splash-header{text-align:center;margin-bottom:2rem;width:100%;max-width:460px}
.splash-emoji{font-size:clamp(3rem,10vw,4.5rem);margin-bottom:1rem;display:block;filter:drop-shadow(0 4px 20px rgba(0,0,0,.35));animation:floatIn .5s cubic-bezier(.34,1.56,.64,1) both}
.splash-title{font-size:clamp(1.6rem,5vw,2.2rem);font-weight:800;letter-spacing:-.03em;line-height:1.15;color:var(--text);margin-bottom:.6rem;animation:slideUp .45s .1s ease both}
.splash-sub{font-size:.88rem;color:var(--sub);max-width:380px;margin:0 auto;line-height:1.6;animation:slideUp .45s .2s ease both}
.splash-sub strong{color:var(--text)}
.urgence-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;width:100%;max-width:500px;margin:0 auto 1rem;animation:slideUp .45s .3s ease both}
.urgence-card{position:relative;overflow:hidden;display:flex;flex-direction:row;align-items:center;gap:0.85rem;padding:1rem 1rem;border-radius:18px;min-height:95px;color:#fff;border:1px solid transparent;transition:transform .15s,box-shadow .15s;cursor:pointer}
.urgence-card::after{content:attr(data-num);position:absolute;right:-.05em;top:-.1em;font-size:4.8rem;font-weight:900;letter-spacing:-.04em;line-height:1;opacity:.13;pointer-events:none;color:#fff}
.urgence-card:active{transform:scale(.96)}
.urgence-phone-icon{flex-shrink:0;width:38px;height:38px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center}
.urgence-phone-icon svg{width:19px;height:19px;stroke:#fff;fill:none;stroke-width:2}
.urgence-info{display:flex;flex-direction:column;gap:0.1rem}
.urgence-number{font-size:1.8rem;font-weight:900;letter-spacing:-.02em;line-height:1;color:#fff}
.urgence-name{font-size:.7rem;font-weight:700;color:rgba(255,255,255,.8);letter-spacing:.07em;text-transform:uppercase}
.uc-samu    {background:linear-gradient(135deg,#7f1d1d 0%,#991b1b 100%)}
.uc-police  {background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 100%)}
.uc-pompiers{background:linear-gradient(135deg,#7c2d12 0%,#c2410c 100%)}
.uc-europe  {background:linear-gradient(135deg,#3730a3 0%,#5b21b6 100%)}
.uc-ssourd  {background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%); grid-column: 1 / -1; max-width: none; width: 100%; margin: 0;}
.uc-local   {background:linear-gradient(135deg,#065f46 0%,#047857 100%); grid-column: span 2; max-width:300px; margin:0 auto; width:100%}
@media(min-width:500px){
  .uc-local { grid-column: span 2; justify-self: center; width: auto; min-width: 240px; }
}
@media(hover:hover){
  .urgence-card:hover{transform:translateY(-3px)}
  .uc-samu:hover{box-shadow:0 12px 36px rgba(239,68,68,.35)}
  .uc-police:hover{box-shadow:0 12px 36px rgba(59,130,246,.35)}
  .uc-pompiers:hover{box-shadow:0 12px 36px rgba(234,88,12,.35)}
  .uc-europe:hover{box-shadow:0 12px 36px rgba(124,58,237,.35)}
  .uc-ssourd:hover{box-shadow:0 12px 36px rgba(148,163,184,.35)}
  .uc-local:hover{box-shadow:0 12px 36px rgba(16,185,129,.35)}
}
.btn-enter{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;max-width:460px;padding:.95rem 1.5rem;background:var(--card);border:1px solid var(--border-h);border-radius:var(--r-lg);font-weight:600;font-size:.92rem;color:var(--sub);cursor:pointer;transition:all .15s;animation:slideUp .45s .4s ease both}
.btn-enter svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.75}
.btn-enter:hover{background:var(--card-h);border-color:var(--accent);color:var(--accent)}
.btn-enter:hover svg{transform:translateX(3px)}
.btn-enter:active{transform:scale(.97)}
/* ─── MAIN ────────────────────────────────────────────────────────── */
#mainContent{display:none}
.main{padding-top:calc(var(--nav-h) + 2rem);padding-bottom:4rem;max-width:780px;margin:0 auto;padding-left:1.25rem;padding-right:1.25rem}
.main-welcome{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:2rem 1.5rem;text-align:center;margin-bottom:2rem}
.main-welcome h1{font-size:clamp(1.4rem,4vw,1.8rem);font-weight:800;margin-bottom:.6rem}
.main-welcome p{font-size:.9rem;color:var(--sub);line-height:1.7;max-width:500px;margin:0 auto}
.local-info{display:flex;flex-direction:column;gap:1rem;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border)}
.local-map-img{width:100%;max-width:100%;border-radius:12px;margin-top:.5rem;border:1px solid var(--border)}
.local-contacts{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-top:.5rem}
.section-title{margin:1rem 0 1rem 0;font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--sub);border-left:3px solid var(--accent);padding-left:.8rem}
.grid-3, .grid-2, .grid-urgences, .grid-situations, .grid-assos{display:grid;gap:.9rem;margin-bottom:2rem}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-urgences{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.grid-situations{grid-template-columns:repeat(2,1fr)}
.grid-assos{grid-template-columns:repeat(2,1fr)}
.card{position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-end;padding:1.2rem 1rem 1rem;border-radius:18px;min-height:115px;background:var(--card);border:1px solid var(--border);transition:transform .15s,background .2s,border-color .2s;cursor:pointer}
.card::after{content:attr(data-icon);position:absolute;right:.2rem;top:.05rem;font-size:4rem;font-weight:400;opacity:.12;pointer-events:none;line-height:1}
.card:hover{background:var(--card-h);border-color:var(--border-h);transform:translateY(-2px)}
.card:active{transform:scale(.96)}
.card-icon{font-size:1.8rem;margin-bottom:.4rem;position:relative;z-index:1}
.card-titre{font-weight:700;font-size:.95rem;margin-bottom:.15rem;position:relative;z-index:1;color:var(--text)}
.card-desc{font-size:.7rem;color:var(--sub);position:relative;z-index:1;line-height:1.3}
.card-emergency{color:#fff;border-color:transparent}
.card-emergency .card-titre, .card-emergency .card-desc{color:#fff}
.card-emergency::after{filter:brightness(0) invert(1)}
.card-bleu{background:linear-gradient(135deg,#0a2b5e,#1e3a8a)}
.card-rouge{background:linear-gradient(135deg,#7f1d1d,#b91c1c)}
.card-orange{background:linear-gradient(135deg,#7c2d12,#c2410c)}
.card-violet{background:linear-gradient(135deg,#3730a3,#5b21b6)}
.card-vert{background:linear-gradient(135deg,#065f46,#047857)}
.card-rose{background:linear-gradient(135deg,#881337,#e11d48)}
.card-cyan{background:linear-gradient(135deg,#0e7490,#06b6d4)}
.card-slate{background:linear-gradient(135deg,#1e293b,#334155)}
.card-blanc{background:linear-gradient(135deg,#f8fafc,#e2e8f0); color:#0f172a}
.card-blanc .card-titre, .card-blanc .card-desc{color:#0f172a; transition:color .15s}
.card-blanc:hover .card-titre, .card-blanc:hover .card-desc{color:#ffffff}
@media(max-width:600px){
  .grid-3,.grid-2,.grid-situations,.grid-assos{grid-template-columns:1fr}
  .grid-urgences{grid-template-columns:1fr}
}
/* ─── MODALS ──────────────────────────────────────────────────────── */
.modal-overlay, .tool-modal-overlay{position:fixed;inset:0;z-index:11000;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:visibility .2s,opacity .2s}
.modal-overlay.active, .tool-modal-overlay.active{visibility:visible;opacity:1}
.modal-container, .tool-modal-container{background:var(--bg1);border-radius:28px;width:90%;max-width:500px;border:1px solid var(--border);box-shadow:0 32px 64px rgba(0,0,0,.5);overflow:hidden;animation:popIn .2s ease}
.modal-header, .tool-modal-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:var(--bg1)}
.modal-header h3, .tool-modal-header h3{font-size:1.1rem;font-weight:700}
.modal-close, .tool-modal-close{width:32px;height:32px;border-radius:40px;background:var(--bg2);color:var(--sub);font-size:1.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer}
.modal-close:hover, .tool-modal-close:hover{background:rgba(239,68,68,.2);color:var(--red);transform:rotate(90deg)}
.modal-body{padding:1.8rem 1.5rem;font-size:.95rem;line-height:1.6;color:var(--text)}
.modal-body ul{margin-left:1.5rem;margin-top:.5rem}
.modal-body li{margin:.5rem 0}
.modal-body strong{color:var(--accent)}
.phone-badge{display:inline-block;background:var(--accent);color:white;padding:.2rem .6rem;border-radius:40px;font-weight:600;font-size:.85rem;margin:0 .1rem;text-decoration:none;transition:background .15s}
.phone-badge:hover{background:var(--green);color:white}
.modal-body a:not(.phone-badge){color:var(--accent);text-decoration:underline}
.tool-modal-body{padding:2rem 1.5rem 1.8rem;display:flex;flex-direction:column;align-items:center;gap:1.5rem}
.tool-status{font-size:1.8rem;font-weight:800;color:var(--accent)}
.tool-button{background:var(--accent);color:white;border:none;padding:.8rem 2rem;border-radius:40px;font-weight:600;font-size:1rem;width:100%;max-width:220px;transition:transform .1s,background .2s}
.tool-button:active{transform:scale(.96)}
.tool-button.stop{background:var(--red)}
.fullscreen-tool{position:fixed;inset:0;z-index:11000;background:white;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:2rem;visibility:hidden;opacity:0;transition:visibility .1s,opacity .1s}
.fullscreen-tool.active{visibility:visible;opacity:1}
.fullscreen-btn{background:rgba(0,0,0,.7);backdrop-filter:blur(12px);color:white;border:none;padding:.8rem 2rem;border-radius:60px;font-weight:600;font-size:1rem;margin-bottom:3rem;cursor:pointer}
.fullscreen-btn:active{transform:scale(.96)}
.flash-white{background:#fff}
.flash-black{background:#000}
@keyframes popIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes floatIn{0%{opacity:0;transform:translateY(20px) scale(0.9)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes slideUp{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<nav id="nav"><button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button><div class="nav-logo" id="navLogo"><div class="nav-logo-badge">⛑️</div><strong id="appTitle">SOS-GUIDE</strong></div><div class="nav-right"><button class="nav-btn" id="langBtn">🌐</button><button class="nav-btn" id="themeToggle">🌙</button></div></nav>
<div id="drawerOverlay" class="drawer-overlay"><div class="drawer"><div class="drawer-header"><span class="drawer-title" id="drawerTitle">Navigation</span><button class="drawer-close" id="drawerCloseBtn">✕</button></div><nav class="drawer-nav" id="drawerNav"></nav><div class="drawer-footer" id="drawerFooter">SOS-GUIDE · version 1.0</div></div></div>
<div id="languageModal" class="lang-modal-overlay"><div class="lang-modal-container"><div class="lang-modal-header"><button class="lang-modal-close" id="closeModalBtn">✕</button></div><div class="lang-grid" id="flagGrid"></div></div></div>
<div id="splashScreen"><div class="splash-header"><span class="splash-emoji">⛑️</span><h1 class="splash-title"></h1><p class="splash-sub"></p></div><div class="urgence-grid" id="urgenceGrid"></div><button class="btn-enter" id="enterBtn"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span id="enterBtnText"></span></button></div>
<div id="mainContent"><div class="main"><div class="main-welcome"><h1 id="welcomeTitle"></h1><p id="welcomeText"></p><div id="localInfoContainer" class="local-info"></div></div><div id="principesSection"></div><div id="outilsSection"></div><div id="urgencesSection"></div><div id="situationsSection"></div><div id="assosSection"></div></div></div>
<!-- modales génériques -->
<div id="genericModal" class="modal-overlay"><div class="modal-container"><div class="modal-header"><h3 id="genericModalTitle"></h3><button class="modal-close" id="closeGenericModal">✕</button></div><div class="modal-body" id="genericModalBody"></div></div></div>
<!-- modales outils -->
<div id="metronomeModal" class="tool-modal-overlay"><div class="tool-modal-container"><div class="tool-modal-header"><h3 id="metroTitle">❤️ Métronome 110 BPM</h3><button class="tool-modal-close close-metronome">✕</button></div><div class="tool-modal-body"><div class="tool-status" id="metroBpmDisplay">110 BPM</div><button id="metroStartStop" class="tool-button"></button></div></div></div>
<div id="flashFullscreen" class="fullscreen-tool flash-white"><button id="flashStopBtn" class="fullscreen-btn"></button></div>
<div id="torcheFullscreen" class="fullscreen-tool"><button id="torcheStopBtn" class="fullscreen-btn"></button></div>
<div id="alerteModal" class="tool-modal-overlay"><div class="tool-modal-container"><div class="tool-modal-header"><h3 id="alerteTitle">🚨 Alerte sonore</h3><button class="tool-modal-close close-alerte">✕</button></div><div class="tool-modal-body"><div class="tool-status" id="sirenStatus"></div><button id="sirenStartStop" class="tool-button"></button></div></div></div>
<div id="respirationModal" class="tool-modal-overlay"><div class="tool-modal-container"><div class="tool-modal-header"><h3 id="respTitle">🌬️ Respiration guidée</h3><button class="tool-modal-close close-respiration">✕</button></div><div class="tool-modal-body" style="text-align:center"><div id="respirationGuide" style="font-size:1.4rem; margin-bottom:1rem"></div><div id="respirationTimer" style="font-size:2rem; font-weight:800">4</div><button id="respirationStartStop" class="tool-button"></button></div></div></div>
<div id="siffletModal" class="tool-modal-overlay"><div class="tool-modal-container"><div class="tool-modal-header"><h3 id="whistleTitle">🔊 Sifflet d'urgence</h3><button class="tool-modal-close close-sifflet">✕</button></div><div class="tool-modal-body"><div class="tool-status" id="whistleStatus"></div><button id="whistleStartStop" class="tool-button"></button></div></div></div>

<script>
// ======================= GESTION DES DONNÉES =======================
let langData = null;
let configData = null;
let currentLang = 'fr';
const languages = [

async function loadConfig() {
  try {
    const res = await fetch('data/config.json');
    if (res.ok) configData = await res.json();
    else configData = { establishment: {} };
  } catch(e) { configData = { establishment: {} }; }
}

async function loadLanguage(lang) {
  try {
    const res = await fetch(`data/${lang}.json`);
    if (!res.ok) throw new Error();
    langData = await res.json();
    currentLang = lang;
    localStorage.setItem('sos_lang', lang);
    if (configData) applyAll();
    else {
      await loadConfig();
      applyAll();
    }
  } catch(e) {
    if(lang !== 'fr') loadLanguage('fr');
    else console.error('Impossible de charger fr.json');
  }
}

function formatPhoneNumbersToBadges(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  const links = div.querySelectorAll('a[href^="tel:"]');
  links.forEach(link => {
    const badge = document.createElement('a');
    badge.href = link.href;
    badge.className = 'phone-badge';
    badge.textContent = link.textContent;
    link.parentNode.replaceChild(badge, link);
  });
  return div.innerHTML;
}

function formatContent(content) {
  if(typeof content === 'string') content = { steps: [content] };
  let html = '';
  if(content.warning) html += `<p style="background:rgba(239,68,68,.2); padding:.5rem; border-radius:12px;">⚠️ ${content.warning}</p>`;
  if(content.steps && content.steps.length) {
    html += '<ul>';
    content.steps.forEach(step => html += `<li>${step}</li>`);
    html += '</ul>';
  }
  if(content.extra) html += `<p>${content.extra}</p>`;
  return formatPhoneNumbersToBadges(html);
}

let audioCtx = null, metActive = false, timeoutId = null, nextBeepTime = 0;
function getAudioCtx() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function playBeep() {
  const ctx = getAudioCtx(); if(ctx.state === 'suspended') ctx.resume();
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.value = 880; gain.gain.value = 0.15;
  osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.2);
  osc.stop(ctx.currentTime + 0.2);
}
function scheduleBeep() {
  if(!metActive) return;
  const ctx = getAudioCtx(); const now = ctx.currentTime;
  nextBeepTime += 60/110;
  const delay = Math.max(0, nextBeepTime - now);
  timeoutId = setTimeout(() => { playBeep(); scheduleBeep(); }, delay * 1000);
}
function startMetro() {
  if(metActive) return;
  metActive = true; const ctx = getAudioCtx(); ctx.resume();
  nextBeepTime = ctx.currentTime; scheduleBeep();
  const btn = document.getElementById('metroStartStop');
  if(langData) btn.textContent = langData.tools.metronome.stop;
  btn.classList.add('stop');
}
function stopMetro() {
  metActive = false; if(timeoutId) clearTimeout(timeoutId);
  const btn = document.getElementById('metroStartStop');
  if(langData) btn.textContent = langData.tools.metronome.start;
  btn.classList.remove('stop');
}
document.getElementById('metroStartStop').addEventListener('click', () => { metActive ? stopMetro() : startMetro(); });
document.querySelector('.close-metronome').addEventListener('click', () => { document.getElementById('metronomeModal').classList.remove('active'); document.body.style.overflow = ''; if(metActive) stopMetro(); });
document.getElementById('metronomeModal').addEventListener('click', e => { if(e.target === document.getElementById('metronomeModal')) { document.getElementById('metronomeModal').classList.remove('active'); document.body.style.overflow = ''; if(metActive) stopMetro(); } });
// Flash SOS
let flashActive = false, flashStep = 0;
function applyFlashColor(isWhite) { document.getElementById('flashFullscreen').style.background = isWhite ? '#fff' : '#000'; }
function runFlashStep() {
  if(!flashActive) return;
  const pattern = ['short','short','short','long','long','long','short','short','short'];
  if(flashStep >= pattern.length) { setTimeout(() => { if(flashActive) { flashStep = 0; runFlashStep(); } }, 1000); return; }
  const duration = pattern[flashStep] === 'short' ? 200 : 600;
  applyFlashColor(true); setTimeout(() => { if(flashActive) applyFlashColor(false); setTimeout(() => { if(flashActive) { flashStep++; runFlashStep(); } }, 50); }, duration);
}
function startFlash() { if(flashActive) return; flashActive = true; flashStep = 0; document.getElementById('flashFullscreen').classList.add('active'); document.body.style.overflow = 'hidden'; runFlashStep(); }
function stopFlash() { flashActive = false; document.getElementById('flashFullscreen').classList.remove('active'); document.body.style.overflow = ''; applyFlashColor(true); }
document.getElementById('flashStopBtn').addEventListener('click', stopFlash);
document.getElementById('flashFullscreen').addEventListener('click', e => { if(e.target === document.getElementById('flashFullscreen')) stopFlash(); });

  const ctx = getAudioCtx(); ctx.resume();
  if(sirenOsc) { sirenOsc.stop(); sirenOsc.disconnect(); }
  sirenOsc = ctx.createOscillator(); sirenGain = ctx.createGain();
  sirenOsc.connect(sirenGain); sirenGain.connect(ctx.destination);
  sirenOsc.type = 'sine'; sirenOsc.frequency.value = 880;
  sirenGain.gain.value = 0.25;
  sirenOsc.start();

    statusDiv.innerHTML = langData.tools.alarm.active;
    btn.textContent = langData.tools.alarm.stop;
  }
  btn.classList.add('stop');
}
function stopSiren() {
  if(sirenOsc) { sirenOsc.stop(); sirenOsc.disconnect(); sirenOsc = null; }
  if(sirenGain) { sirenGain.disconnect(); sirenGain = null; }
  sirenActive = false;
  const statusDiv = document.getElementById('sirenStatus');
  const btn = document.getElementById('sirenStartStop');
  if(langData) {
    statusDiv.innerHTML = langData.tools.alarm.inactive;
    btn.textContent = langData.tools.alarm.start;

let respActive = false, respInterval = null, respPhase = 'inspire', respCount = 4;
function updateRespirationUI() {
  const inspireText = langData ? langData.tools.respiration.inhale : 'Inspirez';
  const expireText = langData ? langData.tools.respiration.exhale : 'Expirez';
  document.getElementById('respirationGuide').textContent = respPhase === 'inspire' ? `🌬️ ${inspireText}` : `🌬️ ${expireText}`;
  document.getElementById('respirationTimer').textContent = respCount;
}
function respirationCycle() {
  if(!respActive) return;
  if(respCount === 1) {
    respPhase = respPhase === 'inspire' ? 'expire' : 'inspire';
    respCount = 4;
    updateRespirationUI();
  } else {
    respCount--;
    updateRespirationUI();
  }
}
function startRespiration() {
  if(respActive) return;
  respActive = true; respPhase = 'inspire'; respCount = 4;
  updateRespirationUI();
  if(respInterval) clearInterval(respInterval);
  respInterval = setInterval(respirationCycle, 1000);
  const btn = document.getElementById('respirationStartStop');
  if(langData) btn.textContent = langData.tools.respiration.stop;
}
function stopRespiration() {
  respActive = false; if(respInterval) clearInterval(respInterval); respInterval = null;
  const btn = document.getElementById('respirationStartStop');
  if(langData) btn.textContent = langData.tools.respiration.start;
}

// Sifflet
let whistleActive = false;
function playWhistle() {
  const ctx = getAudioCtx(); if(ctx.state === 'suspended') ctx.resume();
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = 'triangle'; osc.frequency.value = 2500; gain.gain.value = 0.2;
  osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.8);
  osc.stop(ctx.currentTime + 0.8);
}
function startWhistle() {
  if(whistleActive) return;
  whistleActive = true;
  let count = 0;
  function playSequence() {
    if(!whistleActive) return;
    playWhistle();
    count++;
    if(count < 3) setTimeout(playSequence, 400);
    else { 
      whistleActive = false; 
      const statusDiv = document.getElementById('whistleStatus');
      const btn = document.getElementById('whistleStartStop');
      if(langData) {
        statusDiv.innerHTML = langData.tools.whistle.inactive;
        btn.textContent = langData.tools.whistle.start;
      }
    }
  }
  playSequence();
  const statusDiv = document.getElementById('whistleStatus');
  const btn = document.getElementById('whistleStartStop');
  if(langData) {
    statusDiv.innerHTML = langData.tools.whistle.active;
    btn.textContent = langData.tools.whistle.stop;
  }
}
function stopWhistle() { 
  whistleActive = false; 
  const statusDiv = document.getElementById('whistleStatus');
  const btn = document.getElementById('whistleStartStop');
  if(langData) {
    statusDiv.innerHTML = langData.tools.whistle.inactive;
    btn.textContent = langData.tools.whistle.start;
  }
}
document.getElementById('whistleStartStop').addEventListener('click', () => { whistleActive ? stopWhistle() : startWhistle(); });
document.querySelector('.close-sifflet').addEventListener('click', () => { document.getElementById('siffletModal').classList.remove('active'); document.body.style.overflow = ''; if(whistleActive) stopWhistle(); });
document.getElementById('siffletModal').addEventListener('click', e => { if(e.target === document.getElementById('siffletModal')) { document.getElementById('siffletModal').classList.remove('active'); document.body.style.overflow = ''; if(whistleActive) stopWhistle(); } });

// Exposer les actions globales
window.openMetronome = () => { document.getElementById('metronomeModal').classList.add('active'); document.body.style.overflow = 'hidden'; if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); };
window.openFlashSOS = startFlash;
window.openTorche = openTorche;
window.openAlerte = () => { document.getElementById('alerteModal').classList.add('active'); document.body.style.overflow = 'hidden'; if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); };
window.openRespiration = () => { document.getElementById('respirationModal').classList.add('active'); document.body.style.overflow = 'hidden'; };
window.openSifflet = () => { document.getElementById('siffletModal').classList.add('active'); document.body.style.overflow = 'hidden'; };

// ======================= NAVIGATION, THEME, DRAWER, LANGUE =======================
const themeToggle = document.getElementById('themeToggle');
const THEME_KEY = 'sos_guide_theme';
function setTheme(isLight) { document.body.classList.toggle('light-mode', isLight); themeToggle.textContent = isLight ? '☀️' : '🌙'; localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark'); }
let sv = 'dark'; try { sv = localStorage.getItem(THEME_KEY) || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); } catch(e) {}
setTheme(sv === 'light');
themeToggle.addEventListener('click', () => setTheme(!document.body.classList.contains('light-mode')));

const splashScreen = document.getElementById('splashScreen'), mainContent = document.getElementById('mainContent');
function goToSplash() { splashScreen.classList.remove('hide'); mainContent.style.display = 'none'; window.scrollTo(0,0); }
function goToMain() { splashScreen.classList.add('hide'); mainContent.style.display = 'block'; }
document.getElementById('enterBtn').addEventListener('click', goToMain);
document.getElementById('navLogo').addEventListener('click', goToSplash);

const hamburgerBtn = document.getElementById('hamburgerBtn'), drawerOverlay = document.getElementById('drawerOverlay'), drawerCloseBtn = document.getElementById('drawerCloseBtn');
function openDrawer() { drawerOverlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
function closeDrawer() { drawerOverlay.classList.remove('active'); document.body.style.overflow = ''; }
hamburgerBtn.addEventListener('click', openDrawer); drawerCloseBtn.addEventListener('click', closeDrawer);
drawerOverlay.addEventListener('click', e => { if(e.target === drawerOverlay) closeDrawer(); });

const langBtn = document.getElementById('langBtn'), modalLang = document.getElementById('languageModal'), closeModalBtn = document.getElementById('closeModalBtn');
function openModalLang() { modalLang.classList.add('active'); document.body.style.overflow = 'hidden'; buildFlagGrid(); }
function closeModalLang() { modalLang.classList.remove('active'); document.body.style.overflow = ''; }
langBtn.addEventListener('click', openModalLang); closeModalBtn.addEventListener('click', closeModalLang);
modalLang.addEventListener('click', e => { if(e.target === modalLang) closeModalLang(); });

function buildFlagGrid() {
  const flagGrid = document.getElementById('flagGrid');
  flagGrid.innerHTML = '';
  languages.forEach(lang => {
    const card = document.createElement('div');
    card.className = 'lang-card';
    card.innerHTML = `<div class="lang-flag">${lang.flag}</div><div class="lang-name">${lang.label}</div>`;
    card.addEventListener('click', () => {
      loadLanguage(lang.code);
      closeModalLang();
    });
    flagGrid.appendChild(card);
  });
}

// Chargement initial
const savedLang = localStorage.getItem('sos_lang') || 'fr';
loadConfig().then(() => loadLanguage(savedLang));
</script>
</body>
</html>
